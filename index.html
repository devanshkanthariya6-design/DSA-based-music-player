<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DSA Music Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="player">

    <h2>🎵 Music Player</h2>

    <!-- Song Name -->
    <p id="song-name">No song selected</p>

    <audio id="audio"></audio>

    <!-- Progress Bar -->
    <input type="range" id="progress" value="0">

    <!-- Wave Animation -->
    <div class="wave">
      <span></span><span></span><span></span><span></span><span></span>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button onclick="prevSong()">⏮</button>
      <button onclick="playPause()">▶️</button>
      <button onclick="nextSong()">⏭</button>
      <button onclick="shuffleSong()">🔀</button>
    </div>

    <!-- Extra Buttons -->
    <div class="extras">
      <button onclick="toggleFavorite()">❤️</button>
      <button onclick="showFavorites()">⭐</button>
      <button onclick="toggleTheme()">🌗</button>
    </div>

    <!-- Search -->
    <div class="search-box">
      <input type="text" id="searchBox" placeholder="Search song...">
      <button onclick="searchSong()">🔍</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
